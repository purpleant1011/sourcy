# Solid Queue configuration — PRD Section 2.7
default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    - queues: "critical"
      threads: 3
      processes: 1
      polling_interval: 0.1
    - queues: "default"
      threads: 5
      processes: 2
      polling_interval: 0.1
    - queues: "bulk,low"
      threads: 3
      processes: 1
      polling_interval: 0.5
    - queues: "image_processing"
      threads: 4
      processes: 2
      polling_interval: 0.1

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
